<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add </title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <header>  
    <h1>Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="my_courses.html">My Courses</a></li>
                <li><a href="add_course.html" class="active">Add Courses</a></li>
                <li><a href="contact_us.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="add1" >
            <h2>Add Course</h2>
        </section>

        <section class="form">
            <form action="">
                <div class="name">
                    <label for="name">Course Name:</label>
                    <input type="text" id="name" placeholder="Enter Course Name">
                </div>
                
                <div class="Instructor">
                    <label for="Instructor">Instructor:</label>
                    <input type="text" id="Instructor" placeholder="Enter Instructor">
                </div>

                <div class="Hours">       
                 <label for="Hours">Hours:</label>
                 <input type="number" id="Hours" >
                
                </div>

                <div class="note">
                    <label for="note">Notes:</label>
                    <textarea rows="3" name="note" id="note" placeholder="Enter your Notes"></textarea>

                </div>
                <button type="submit">Add Course</button>
            </form>



        </section>


      </main>

      <footer>
        <p>&copy; Youseef Amr</p> 
      </footer>
</body>
</html>
